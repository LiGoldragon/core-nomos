[package]
name         = "core-nomos"
version      = "0.1.0"
edition      = "2024"
rust-version = "1.85"
license      = "MIT OR Apache-2.0"
repository   = "https://github.com/LiGoldragon/core-nomos"
description  = "The stringless Core of Nomos: macros as typed data transforming CoreSchema into CoreLogos. Two macro kinds (named + structural), a stateful-at-rest content-identified MacroPackage, a closed template escape algebra (Realize / Splice / Invoke), and an engine whose acceptance oracle is the byte-exact generated Rust of the real goldens. TextualNomos (the $ / bracket text surface) is deferred."
publish      = false

[lib]
name = "core_nomos"
path = "src/lib.rs"

[dependencies]
content-identity = { git = "https://github.com/LiGoldragon/content-identity.git", rev = "6cc0408cdb96f174cc8fdf6ca23420038de28450" }
name-table       = { git = "https://github.com/LiGoldragon/name-table.git", rev = "c3237f77c087e6feab49d6cf34971cebc14a11e6" }
core-schema      = { git = "https://github.com/LiGoldragon/core-schema.git", rev = "d3cdee9ac2c17de16a7745c9854344d8bbcde64e" }
core-logos       = { git = "https://github.com/LiGoldragon/core-logos.git", rev = "2b9ed8fb758de951a76af35a65b4b53b9d210583" }
textual-rust     = { git = "https://github.com/LiGoldragon/textual-rust.git", rev = "ee7859ff10b0710fab9e87672c66d8c889b67c63" }
rkyv             = { version = "0.8", default-features = false, features = ["std", "bytecheck", "little_endian", "pointer_width_32", "unaligned"] }
thiserror        = "2"

[dev-dependencies]
structural-codec = { git = "https://github.com/LiGoldragon/structural-codec.git", rev = "104f92454a5ba88b376fa706a9fe38c4a4b65ee0" }

[lints.rust]
unsafe_code = "forbid"
unused      = { level = "warn", priority = -1 }
dead_code   = "warn"
